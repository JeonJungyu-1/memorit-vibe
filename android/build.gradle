buildscript {
    ext {
        buildToolsVersion = "36.1.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects {
    repositories {
        google()
        mavenCentral()
        jcenter()
        // AsyncStorage 3.x: storage-android 아티팩트가 npm 패키지 local_repo에 포함됨
        maven {
            url "file://${rootProject.projectDir}/../node_modules/@react-native-async-storage/async-storage/android/local_repo"
        }
        maven {
            url "https://archive.apache.org/dist/ivy/"
            metadataSources {
                artifact()
            }
        }
    }
}

